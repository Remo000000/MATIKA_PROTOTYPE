{% load i18n %}
<div class="matika-sidebar-footer">
  {% if request.user.is_authenticated %}
    <div class="small text-muted mb-2">{% trans "Signed in as" %} <span class="text-body fw-semibold">{{ request.user.get_short_name|default:request.user.email }}</span></div>
    <form method="post" action="{% url 'accounts:logout' %}" class="w-100">
      {% csrf_token %}
      <button type="submit" class="btn btn-outline-primary btn-sm w-100"><i class="bi bi-box-arrow-right me-1"></i>{% trans "Logout" %}</button>
    </form>
  {% else %}
    <a class="btn btn-outline-primary btn-sm w-100" href="{% url 'accounts:login' %}">{% trans "Login" %}</a>
  {% endif %}
</div>
