# One-command stack: PostgreSQL + Django (Gunicorn). Suitable for demos and "production-like" local checks.
# Security: replace SECRET_KEY and DB passwords before any internet-facing deploy; use HTTPS behind a reverse
# proxy; do not expose the db port publicly; keep .env out of version control.
# Usage: copy .env.example to .env, then: docker compose up --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: matika
      POSTGRES_USER: matika
      POSTGRES_PASSWORD: matika
    volumes:
      - matika_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matika -d matika"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DEBUG: "0"
      SECRET_KEY: "docker-compose-dev-only-change-me-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
      ALLOWED_HOSTS: "127.0.0.1,localhost,0.0.0.0"
      DATABASE_URL: "postgres://matika:matika@db:5432/matika"
      CSRF_TRUSTED_ORIGINS: "http://127.0.0.1:8000,http://localhost:8000"
      DEFAULT_ORGANIZATION_SLUG: default
      DEFAULT_ORGANIZATION_NAME: "Default organization"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn matika.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"

volumes:
  matika_pgdata:
